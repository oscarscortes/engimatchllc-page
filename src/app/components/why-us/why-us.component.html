<section id="why-us" class="py-24 bg-dark overflow-hidden">
  <!-- BG decoration -->
  <div class="absolute inset-0 pointer-events-none overflow-hidden">
    <div class="absolute top-1/4 right-0 w-72 h-72 bg-primary/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
  </div>

  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <!-- Header -->
    <div class="text-center mb-20">
      <span
        class="inline-block bg-primary/20 text-primary-light font-semibold text-sm px-4 py-1.5 rounded-full mb-4"
      >
        {{ 'whyUs.badge' | translate }}
      </span>
      <h2 class="text-3xl md:text-4xl font-bold text-white mb-4">
        {{ 'whyUs.title' | translate }}
      </h2>
      <p class="text-slate-400 text-lg max-w-2xl mx-auto">
        {{ 'whyUs.subtitle' | translate }}
      </p>
    </div>

    <!-- Steps -->
    <div class="relative">
      <!-- Connecting line (desktop) -->
      <div
        class="hidden lg:block absolute top-10 left-[10%] right-[10%] h-0.5 bg-gradient-to-r from-primary/0 via-primary/40 to-primary/0"
      ></div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-8">
        <div
          *ngFor="let step of steps; let i = index"
          class="relative flex flex-col items-center text-center group"
        >
          <!-- Number circle -->
          <div
            class="relative w-20 h-20 rounded-full flex items-center justify-center mb-6 z-10 bg-gradient-to-br from-primary to-primary-dark shadow-lg shadow-primary/30 transition-transform duration-300 group-hover:scale-110"
          >
            <span class="text-white font-extrabold text-lg">{{
                'whyUs.steps.' + i + '.number' | translate
              }}</span>
          </div>

          <!-- Content -->
          <h3 class="text-white font-bold text-base mb-3">
            {{ 'whyUs.steps.' + i + '.title' | translate }}
          </h3>

          <!-- Arrow between steps (mobile/tablet) -->
          <div *ngIf="i < steps.length - 1" class="lg:hidden mt-6 text-primary/40">
            <svg class="w-6 h-6 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 9l-7 7-7-7"
              />
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
